html/head_include="<script>\n(function () {\n\tconst NativeAudioContext = window.AudioContext || window.webkitAudioContext;\n\tif (!NativeAudioContext) {\n\t\tconsole.log('[NCT audio hook] NativeAudioContext unavailable');\n\t\treturn;\n\t}\n\tconst contexts = [];\n\tfunction registerContext(ctx) {\n\t\tif (contexts.indexOf(ctx) === -1) {\n\t\t\tcontexts.push(ctx);\n\t\t\tconsole.log('[NCT audio hook] registered context state=' + ctx.state + ' total=' + contexts.length);\n\t\t}\n\t\treturn ctx;\n\t}\n\tfunction WrappedAudioContext(...args) {\n\t\tconsole.log('[NCT audio hook] creating AudioContext');\n\t\treturn registerContext(new NativeAudioContext(...args));\n\t}\n\tWrappedAudioContext.prototype = NativeAudioContext.prototype;\n\tObject.setPrototypeOf(WrappedAudioContext, NativeAudioContext);\n\twindow.AudioContext = WrappedAudioContext;\n\tif (window.webkitAudioContext) {\n\t\twindow.webkitAudioContext = WrappedAudioContext;\n\t}\n\twindow.__nctSetMusicMuted = function (isMuted) {\n\t\tconsole.log('[NCT audio hook] setMusicMuted=' + isMuted + ' contexts=' + contexts.length);\n\t\tcontexts.forEach((ctx, index) => {\n\t\t\tif (!ctx) {\n\t\t\t\treturn;\n\t\t\t}\n\t\t\tconsole.log('[NCT audio hook] context #' + index + ' before state=' + ctx.state);\n\t\t\tif (isMuted) {\n\t\t\t\tif (ctx.state === 'running') {\n\t\t\t\t\tctx.suspend().then(() => {\n\t\t\t\t\t\tconsole.log('[NCT audio hook] context #' + index + ' suspended -> ' + ctx.state);\n\t\t\t\t\t}).catch((err) => {\n\t\t\t\t\t\tconsole.log('[NCT audio hook] context #' + index + ' suspend failed', err);\n\t\t\t\t\t});\n\t\t\t\t}\n\t\t\t} else if (ctx.state !== 'running') {\n\t\t\t\tctx.resume().then(() => {\n\t\t\t\t\tconsole.log('[NCT audio hook] context #' + index + ' resumed -> ' + ctx.state);\n\t\t\t\t}).catch((err) => {\n\t\t\t\t\tconsole.log('[NCT audio hook] context #' + index + ' resume failed', err);\n\t\t\t\t});\n\t\t\t}\n\t\t});\n\t};\n}());\n</script>"
